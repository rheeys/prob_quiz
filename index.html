<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>확률 기초 퀴즈 — 직관 vs 사실</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0a0a0f;
  --surface: #13131a;
  --card:    #1a1a24;
  --border:  #2a2a3e;
  --accent:  #6c63ff;
  --accent2: #ff6b6b;
  --gold:    #ffd166;
  --green:   #06d6a0;
  --text:    #e8e8f5;
  --muted:   #6b6b8a;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Pretendard', system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 배경 그리드 패턴 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  position: relative;
  z-index: 1;
}

/* 헤더 */
.hero {
  text-align: center;
  padding: 48px 0 40px;
  margin-bottom: 40px;
  position: relative;
}
.hero-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #e8e8f5 30%, #6c63ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto 28px;
}

/* 진행 상태 바 */
.progress-bar-wrap {
  background: var(--border);
  border-radius: 4px;
  height: 4px;
  margin-bottom: 6px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.progress-label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  text-align: right;
}

/* 퀴즈 카드 */
.quiz-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  display: none;
  animation: fadeUp .4s ease forwards;
}
.quiz-card.active { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* 카드 상단 강조선 */
.quiz-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.quiz-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.quiz-type-badge {
  background: rgba(108,99,255,.15);
  color: var(--accent);
  border: 1px solid rgba(108,99,255,.3);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 10px;
}
.quiz-q {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 24px;
}
.trap-hint {
  display: inline-block;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--gold);
  background: rgba(255,209,102,.08);
  border: 1px solid rgba(255,209,102,.2);
  padding: 3px 10px;
  border-radius: 6px;
  margin-bottom: 16px;
}

/* OX 버튼 */
.ox-btns {
  display: flex;
  gap: 12px;
}
.ox-btn {
  flex: 1;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--surface);
  font-size: 32px;
  cursor: pointer;
  transition: all .2s;
  color: var(--text);
  font-family: var(--sans);
  font-weight: 900;
  position: relative;
  overflow: hidden;
}
.ox-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity .2s;
}
.ox-btn:hover::before { opacity: 1; }
.ox-btn.O::before { background: rgba(6,214,160,.08); }
.ox-btn.X::before { background: rgba(255,107,107,.08); }
.ox-btn:hover { transform: translateY(-2px); }
.ox-btn.O:hover { border-color: var(--green); }
.ox-btn.X:hover { border-color: var(--accent2); }
.ox-btn.selected-correct { border-color: var(--green); background: rgba(6,214,160,.12); }
.ox-btn.selected-wrong   { border-color: var(--accent2); background: rgba(255,107,107,.12); }
.ox-btn.reveal-correct   { border-color: var(--green); background: rgba(6,214,160,.08); }
.ox-btn:disabled { cursor: default; transform: none; }

/* 4지선다 */
.mc-choices { display: flex; flex-direction: column; gap: 10px; }
.mc-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  font-family: var(--sans);
  text-align: left;
  transition: all .2s;
  line-height: 1.5;
}
.mc-btn:hover { border-color: var(--accent); transform: translateX(4px); }
.mc-choice-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all .2s;
}
.mc-btn:hover .mc-choice-num { background: var(--accent); }
.mc-btn.selected-correct { border-color: var(--green); background: rgba(6,214,160,.08); }
.mc-btn.selected-correct .mc-choice-num { background: var(--green); color: #000; }
.mc-btn.selected-wrong   { border-color: var(--accent2); background: rgba(255,107,107,.08); }
.mc-btn.selected-wrong   .mc-choice-num { background: var(--accent2); color: #fff; }
.mc-btn.reveal-correct   { border-color: var(--green); background: rgba(6,214,160,.06); }
.mc-btn.reveal-correct   .mc-choice-num { background: var(--green); color: #000; }
.mc-btn:disabled { cursor: default; transform: none; }

/* 단답형 */
.short-inp-wrap {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.short-inp {
  flex: 1;
  min-width: 120px;
  padding: 12px 16px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 16px;
  font-family: var(--mono);
  outline: none;
  transition: border-color .2s;
}
.short-inp:focus { border-color: var(--accent); }
.short-inp.correct { border-color: var(--green); background: rgba(6,214,160,.08); }
.short-inp.wrong   { border-color: var(--accent2); background: rgba(255,107,107,.08); }
.submit-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .2s;
}
.submit-btn:hover { background: #5a52e0; transform: translateY(-1px); }
.submit-btn:disabled { opacity: .4; cursor: default; transform: none; }

/* 해설 박스 */
.explanation {
  display: none;
  margin-top: 20px;
  padding: 18px 20px;
  border-radius: 12px;
  background: rgba(108,99,255,.07);
  border: 1px solid rgba(108,99,255,.2);
  font-size: 14px;
  line-height: 1.8;
  color: #c8c8e8;
  animation: fadeUp .3s ease;
}
.explanation.show { display: block; }
.explanation strong { color: var(--text); }
.trap-reveal {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(255,209,102,.07);
  border: 1px solid rgba(255,209,102,.2);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--gold);
}

/* 다음 버튼 */
.next-btn {
  display: none;
  margin-top: 16px;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .2s;
}
.next-btn.show { display: inline-block; }
.next-btn:hover { opacity: .88; transform: translateY(-1px); }

/* 결과 화면 */
.result-screen {
  display: none;
  text-align: center;
  padding: 48px 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  animation: fadeUp .5s ease;
}
.result-screen.show { display: block; }
.result-score {
  font-size: 72px;
  font-weight: 900;
  font-family: var(--mono);
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
}
.result-label { font-size: 16px; color: var(--muted); margin-bottom: 24px; }
.result-msg { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.result-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
.restart-btn {
  padding: 14px 36px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .2s;
}
.restart-btn:hover { opacity: .88; transform: translateY(-2px); }

/* 정답/오답 아이콘 */
.result-icon {
  font-size: 20px;
  margin-left: 8px;
  vertical-align: middle;
}

@media(max-width:500px) {
  .quiz-card { padding: 20px; }
  .ox-btn { font-size: 24px; padding: 14px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="hero">
<div class="hero-tag">확률 기초 퀴즈</div>
<h1>직관이 틀릴 때,<br>수학이 맞다</h1>
<p class="hero-sub">우리의 직관은 확률 앞에서 자주 틀립니다.<br>10개의 문제로 확인해 보세요.</p>
</div>
<div class="progress-bar-wrap">
<div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>
<div class="progress-label" id="progressLabel">0 / 10 완료</div>
<div style="margin-bottom:24px"></div>
<div id="quizContainer"></div>
<div class="result-screen" id="resultScreen">
<div class="result-score" id="resultScore">0/10</div>
<div class="result-label">정답 수</div>
<div class="result-msg" id="resultMsg"></div>
<div class="result-sub" id="resultSub"></div>
<button class="restart-btn" onclick="restart()">↺ 다시 풀기</button>
</div>
</div>
<script>

var QUIZZES = [{"id": 1, "type": "ox", "question": "동전을 10번 던져서 10번 모두 앞면이 나왔다면, 11번째에는 뒷면이 나올 확률이 더 높다.", "answer": "X", "explanation": "동전의 각 시행은 독립적입니다. 앞의 결과와 관계없이 11번째도 항상 50%입니다. '이번엔 뒷면이 나올 차례'라는 느낌은 도박사의 오류(Gambler's Fallacy)입니다.", "trap": "직관: 뒷면이 나올 차례 / 사실: 항상 50%"}, {"id": 2, "type": "mc", "question": "어떤 병의 유병률은 0.1%(1000명 중 1명)입니다. 이 병을 99% 정확도로 검출하는 검사에서 양성이 나왔습니다. 실제로 이 병에 걸렸을 확률은?", "choices": ["99%", "약 50%", "약 9%", "0.1%"], "answer": 2, "explanation": "베이즈 정리로 계산하면 약 9%입니다. 유병률이 낮으면 검사의 정확도가 높아도 양성 예측도가 낮습니다. 1000명 중 실제 환자 1명(99%로 양성→0.99명), 건강한 999명 중 1% 오진→9.99명. 양성 총 10.98명 중 진짜 환자는 0.99명, 약 9%.", "trap": "직관: 검사가 99% 정확하니 양성이면 거의 확실 / 사실: 유병률이 낮으면 9%에 불과"}, {"id": 3, "type": "ox", "question": "로또 번호 1, 2, 3, 4, 5, 6의 당첨 확률은 7, 14, 21, 28, 35, 42보다 낮다.", "answer": "X", "explanation": "모든 번호 조합의 당첨 확률은 동일합니다. 1~6이 '규칙적'으로 보여서 당첨 가능성이 낮다고 느끼지만, 확률적으로는 완전히 동등합니다.", "trap": "직관: 규칙적인 숫자는 덜 나올 것 같다 / 사실: 모든 조합은 동일 확률"}, {"id": 4, "type": "mc", "question": "몬티 홀 문제: 3개의 문 중 1개 뒤에 자동차가 있습니다. 문 하나를 선택하자 진행자가 다른 문(염소)을 열어줬습니다. 지금 바꾸면 당첨 확률은?", "choices": ["1/3", "1/2", "2/3", "3/4"], "answer": 2, "explanation": "바꾸면 2/3입니다. 처음 선택이 틀릴 확률이 2/3이고, 진행자가 정보를 공개한 후 바꾸면 그 2/3을 그대로 가져올 수 있습니다. 수학적으로 검증됐지만 대부분의 사람이 1/2라고 직관적으로 느낍니다.", "trap": "직관: 문이 2개 남았으니 50% / 사실: 바꾸면 67%"}, {"id": 5, "type": "short", "question": "생일이 같은 사람이 한 쌍이라도 있을 확률이 50%를 넘으려면 사람이 몇 명 이상 모여야 할까요? (어림값으로 답하세요)", "answer": "23", "explanation": "놀랍게도 23명이면 충분합니다. 365명이 필요할 것 같지만, 쌍의 수가 기하급수적으로 늘기 때문입니다. 23명이면 쌍의 수는 253쌍이나 됩니다.", "trap": "직관: 수백 명은 있어야 / 사실: 23명"}, {"id": 6, "type": "mc", "question": "두 사건 A와 B가 독립일 때, P(A와 B 모두 발생)는?", "choices": ["P(A) + P(B)", "P(A) × P(B)", "P(A) + P(B) - P(A∩B)", "P(A|B) × P(B)"], "answer": 1, "explanation": "독립 사건의 곱사건 확률은 P(A) × P(B)입니다. 독립이 아닐 때는 P(A|B) × P(B)를 씁니다. P(A)+P(B)는 합사건의 상한이고, P(A)+P(B)-P(A∩B)는 합사건의 정확한 공식입니다.", "trap": "독립이면 단순히 더하면 된다고 생각하기 쉬움"}, {"id": 7, "type": "ox", "question": "어떤 사건의 확률이 0.001이면, 이 사건은 1000번 시행하면 반드시 1번은 일어난다.", "answer": "X", "explanation": "1000번 시행했을 때 한 번도 안 일어날 확률은 (1-0.001)^1000 ≈ 0.368, 즉 약 37%입니다. '반드시'가 아니라 '평균적으로 1번 기대된다'는 표현이 정확합니다.", "trap": "직관: 1/1000 확률이니 1000번이면 반드시 / 사실: 37% 확률로 한 번도 안 일어날 수 있음"}, {"id": 8, "type": "mc", "question": "사건 A가 일어났다는 조건 하에 사건 B가 일어날 확률을 무엇이라 하나요?", "choices": ["결합확률", "주변확률", "조건부확률", "독립확률"], "answer": 2, "explanation": "P(B|A)를 조건부확률이라 합니다. 나이브 베이즈 스팸 필터에서 P(단어|스팸)이 바로 이것입니다. '스팸이라는 조건 하에 이 단어가 등장할 확률'입니다.", "trap": "나이브 베이즈의 핵심 개념 — 조건부확률"}, {"id": 9, "type": "ox", "question": "P(A|B) = P(B|A)이다.", "answer": "X", "explanation": "일반적으로 P(A|B) ≠ P(B|A)입니다. 예: P(비가 온다|구름이 낀다) ≠ P(구름이 낀다|비가 온다). 비가 올 때는 항상 구름이 끼지만, 구름이 낀다고 항상 비가 오지는 않습니다. 이 혼동을 '전치의 오류'라 합니다.", "trap": "직관: 순서를 바꿔도 같을 것 같다 / 사실: 완전히 다를 수 있음"}, {"id": 10, "type": "mc", "question": "어떤 학교에서 남학생 60%, 여학생 40%입니다. 안경 착용률은 남학생 30%, 여학생 50%입니다. 임의로 뽑은 학생이 안경을 썼다면, 이 학생이 여학생일 확률은?", "choices": ["약 40%", "약 50%", "약 53%", "약 60%"], "answer": 2, "explanation": "베이즈 정리: P(여|안경) = P(안경|여)×P(여) / P(안경). P(안경) = 0.3×0.6 + 0.5×0.4 = 0.38. P(여|안경) = 0.5×0.4 / 0.38 ≈ 0.526 ≈ 53%. 여학생 비율(40%)보다 높아집니다.", "trap": "직관: 여학생이 40%니까 답도 40% 근처 / 사실: 안경 착용률이 높아서 53%로 올라감"}];
var cur = 0;
var score = 0;
var total = QUIZZES.length;

function getTypeName(t) {
  if (t==='ox') return 'O / X';
  if (t==='mc') return '4지선다';
  return '단답형';
}

function renderAll() {
  var container = document.getElementById('quizContainer');
  var html = '';
  QUIZZES.forEach(function(q, i) {
    html += renderCard(q, i);
  });
  container.innerHTML = html;
  showCard(0);
  updateProgress();
}

function renderCard(q, i) {
  var h = '<div class="quiz-card" id="card'+i+'">';
  h += '<div class="quiz-num">Q' + (i+1) + ' / ' + total;
  h += ' <span class="quiz-type-badge">' + getTypeName(q.type) + '</span></div>';
  h += '<div class="quiz-q">' + q.question + '</div>';

  if (q.type === 'ox') {
    h += '<div class="ox-btns">';
    h += '<button class="ox-btn O" onclick="answerOX('+i+',\'O\')">O</button>';
    h += '<button class="ox-btn X" onclick="answerOX('+i+',\'X\')">X</button>';
    h += '</div>';
  } else if (q.type === 'mc') {
    h += '<div class="mc-choices">';
    q.choices.forEach(function(c, ci) {
      h += '<button class="mc-btn" onclick="answerMC('+i+','+ci+')">';
      h += '<span class="mc-choice-num">' + (ci+1) + '</span>';
      h += '<span>' + c + '</span></button>';
    });
    h += '</div>';
  } else {
    h += '<div class="short-inp-wrap">';
    h += '<input type="text" class="short-inp" id="inp'+i+'" placeholder="답을 입력하세요"'
       + ' onkeydown="if(event.key===\'Enter\')answerShort('+i+')">';
    h += '<button class="submit-btn" onclick="answerShort('+i+')">확인</button>';
    h += '</div>';
  }

  h += '<div class="explanation" id="exp'+i+'">';
  h += '<strong>해설:</strong> ' + q.explanation;
  if (q.trap) {
    h += '<div class="trap-reveal">💡 직관 vs 사실 &nbsp;|&nbsp; ' + q.trap + '</div>';
  }
  h += '</div>';

  var isLast = (i === total - 1);
  h += '<button class="next-btn" id="next'+i+'" onclick="' + (isLast ? 'showResult()' : 'goNext('+i+')') + '">';
  h += isLast ? '결과 보기 →' : '다음 문제 →';
  h += '</button>';
  h += '</div>';
  return h;
}

function showCard(i) {
  document.querySelectorAll('.quiz-card').forEach(function(el) {
    el.classList.remove('active');
  });
  var el = document.getElementById('card'+i);
  if (el) el.classList.add('active');
  // 단답형 포커스
  var inp = document.getElementById('inp'+i);
  if (inp) setTimeout(function(){inp.focus();}, 200);
}

function updateProgress() {
  var pct = Math.round((cur / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').innerText = cur + ' / ' + total + ' 완료';
}

function disableCard(i) {
  var card = document.getElementById('card'+i);
  if (!card) return;
  card.querySelectorAll('button:not(.next-btn), input').forEach(function(el) {
    el.disabled = true;
  });
}

function showExp(i) {
  var el = document.getElementById('exp'+i);
  if (el) el.classList.add('show');
  var nb = document.getElementById('next'+i);
  if (nb) nb.classList.add('show');
}

// OX 답변
function answerOX(i, val) {
  var q = QUIZZES[i];
  var correct = (val === q.answer);
  if (correct) score++;
  disableCard(i);
  var btns = document.querySelectorAll('#card'+i+' .ox-btn');
  btns.forEach(function(b) {
    if (b.classList.contains(val)) {
      b.classList.add(correct ? 'selected-correct' : 'selected-wrong');
      b.innerHTML = b.innerHTML + ' <span class="result-icon">' + (correct?'✓':'✗') + '</span>';
    }
    if (!correct && b.classList.contains(q.answer)) {
      b.classList.add('reveal-correct');
    }
  });
  showExp(i);
}

// MC 답변
function answerMC(i, ci) {
  var q = QUIZZES[i];
  var correct = (ci === q.answer);
  if (correct) score++;
  disableCard(i);
  var btns = document.querySelectorAll('#card'+i+' .mc-btn');
  btns.forEach(function(b, bi) {
    if (bi === ci) {
      b.classList.add(correct ? 'selected-correct' : 'selected-wrong');
    }
    if (!correct && bi === q.answer) {
      b.classList.add('reveal-correct');
    }
  });
  showExp(i);
}

// 단답형 답변
function answerShort(i) {
  var q = QUIZZES[i];
  var inp = document.getElementById('inp'+i);
  if (!inp || inp.disabled) return;
  var val = inp.value.trim();
  if (!val) return;
  // 숫자 답 ±10% 허용 또는 문자열 포함 여부
  var correct = false;
  var numAns = parseFloat(q.answer);
  var numVal = parseFloat(val);
  if (!isNaN(numAns) && !isNaN(numVal)) {
    correct = Math.abs(numVal - numAns) <= numAns * 0.15;
  } else {
    correct = val.toString().toLowerCase().indexOf(q.answer.toLowerCase()) >= 0
           || q.answer.toLowerCase().indexOf(val.toLowerCase()) >= 0;
  }
  if (correct) score++;
  inp.classList.add(correct ? 'correct' : 'wrong');
  inp.disabled = true;
  var submitBtn = inp.parentNode.querySelector('.submit-btn');
  if (submitBtn) submitBtn.disabled = true;
  // 정답 표시
  if (!correct) {
    var hint = document.createElement('div');
    hint.style.cssText = 'margin-top:8px;font-size:13px;color:#06d6a0;font-family:var(--mono)';
    hint.innerText = '정답: ' + q.answer;
    inp.parentNode.appendChild(hint);
  }
  showExp(i);
}

function goNext(i) {
  cur = i + 1;
  updateProgress();
  showCard(cur);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  cur = total;
  updateProgress();
  document.querySelectorAll('.quiz-card').forEach(function(el) { el.classList.remove('active'); });
  var rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  var pct = Math.round(score / total * 100);
  document.getElementById('resultScore').innerText = score + '/' + total;
  var msg, sub;
  if (pct === 100) {
    msg = '완벽합니다! 🎉';
    sub = '확률의 직관과 사실을 모두 꿰뚫었습니다. 나이브 베이즈도 문제없겠네요!';
  } else if (pct >= 70) {
    msg = '훌륭합니다! 👏';
    sub = '확률적 사고가 탄탄합니다. 틀린 문제의 해설을 다시 읽어보세요.';
  } else if (pct >= 50) {
    msg = '잘 했습니다! 🙂';
    sub = '직관이 사실과 다른 경우가 많죠? 해설을 통해 개념을 정리해 보세요.';
  } else {
    msg = '확률은 직관을 배신합니다 😄';
    sub = '그래서 흥미롭습니다! 해설을 꼼꼼히 읽고 다시 도전해 보세요.';
  }
  document.getElementById('resultMsg').innerText = msg;
  document.getElementById('resultSub').innerText = sub;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  score = 0; cur = 0;
  document.getElementById('resultScreen').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();

</script>
</body>
</html>
