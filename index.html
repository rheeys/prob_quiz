<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>확률 기초 퀴즈 — 직관과 수학 사이</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg:      #0a0a12;
  --surface: #13131f;
  --border:  #1e1e35;
  --accent:  #6366f1;
  --accent2: #ec4899;
  --gold:    #f59e0b;
  --green:   #10b981;
  --red:     #ef4444;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --card-bg: #0f0f1e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 배경 격자 */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  position: relative;
  z-index: 1;
}

/* 헤더 */
.hero {
  text-align: center;
  margin-bottom: 48px;
}
.hero-label {
  display: inline-block;
  padding: 4px 14px;
  border: 1px solid var(--accent);
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace;
}
.hero h1 {
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 14px;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #ec4899 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}

/* 진행 바 */
.progress-wrap {
  margin-bottom: 32px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
}
.progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* 퀴즈 카드 */
.qcard {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 0;
  display: none;
  animation: fadeUp .35s ease;
}
.qcard.active { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.qcard-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.q-num {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.q-tag {
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(99,102,241,.15);
  color: #a5b4fc;
  letter-spacing: 0.5px;
}
.q-type {
  margin-left: auto;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.type-ox   { background:rgba(245,158,11,.12); color:#f59e0b; }
.type-mc   { background:rgba(16,185,129,.12); color:#10b981; }
.type-short{ background:rgba(236,72,153,.12); color:#ec4899; }

.q-text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.65;
  color: #fff;
  margin-bottom: 24px;
}

/* OX 버튼 */
.ox-btns {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.ox-btn {
  flex: 1;
  padding: 16px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--surface);
  font-size: 32px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  color: var(--text);
}
.ox-btn:hover { border-color: var(--accent); background: rgba(99,102,241,.08); transform: translateY(-2px); }
.ox-btn.correct { border-color: var(--green); background: rgba(16,185,129,.12); }
.ox-btn.wrong   { border-color: var(--red);   background: rgba(239,68,68,.12); }
.ox-btn.dimmed  { opacity: .35; }
.ox-btn .ox-label { font-size: 13px; font-weight: 700; margin-top: 6px; display: block; }

/* 4지선다 */
.mc-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.mc-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all .18s;
  text-align: left;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  font-family: 'Noto Sans KR', sans-serif;
}
.mc-btn:hover { border-color: var(--accent); background: rgba(99,102,241,.07); }
.mc-idx {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  transition: all .18s;
}
.mc-btn:hover .mc-idx { background: var(--accent); color: #fff; }
.mc-btn.correct { border-color: var(--green); background: rgba(16,185,129,.1); }
.mc-btn.correct .mc-idx { background: var(--green); color: #fff; }
.mc-btn.wrong   { border-color: var(--red); background: rgba(239,68,68,.08); }
.mc-btn.wrong .mc-idx   { background: var(--red); color: #fff; }
.mc-btn.show-correct { border-color: var(--green); background: rgba(16,185,129,.06); }
.mc-btn.show-correct .mc-idx { background: var(--green); color:#fff; }
.mc-btn.dimmed  { opacity: .4; cursor: default; }

/* 단답형 */
.short-area {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.short-inp {
  flex: 1;
  min-width: 160px;
  padding: 12px 16px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  transition: border-color .2s;
}
.short-inp:focus { border-color: var(--accent); }
.short-inp.correct { border-color: var(--green); background: rgba(16,185,129,.08); }
.short-inp.wrong   { border-color: var(--red);   background: rgba(239,68,68,.06); }
.submit-btn {
  padding: 12px 22px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  font-family: 'Noto Sans KR', sans-serif;
}
.submit-btn:hover { background: #818cf8; transform: translateY(-1px); }
.submit-btn:disabled { opacity: .4; cursor: default; transform: none; }

/* 해설 박스 */
.explain {
  display: none;
  margin-top: 16px;
  padding: 16px;
  border-radius: 10px;
  border-left: 3px solid var(--accent);
  background: rgba(99,102,241,.07);
  font-size: 13px;
  line-height: 1.75;
  color: #c7d2fe;
}
.explain.show { display: block; animation: fadeUp .3s ease; }
.explain strong { color: #fff; }
.result-icon {
  font-size: 18px;
  margin-right: 6px;
}

/* 다음 버튼 */
.next-btn {
  display: none;
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Noto Sans KR', sans-serif;
}
.next-btn.show { display: block; animation: fadeUp .3s ease; }
.next-btn:hover { opacity: .9; transform: translateY(-1px); }

/* 결과 화면 */
.result-screen {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.result-screen.show { display: block; animation: fadeUp .4s ease; }
.score-ring {
  width: 140px; height: 140px;
  border-radius: 50%;
  border: 6px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 24px;
  position: relative;
  background: var(--card-bg);
}
.score-ring svg {
  position: absolute; inset: -6px;
  width: calc(100% + 12px); height: calc(100% + 12px);
  transform: rotate(-90deg);
}
.score-ring circle {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
}
.score-num {
  font-size: 36px; font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
  line-height: 1;
}
.score-denom {
  font-size: 14px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.score-grade {
  font-size: 22px; font-weight: 900;
  margin-bottom: 8px;
}
.score-msg { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.review-list {
  text-align: left;
  margin-bottom: 24px;
}
.review-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  font-size: 13px;
}
.review-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.restart-btn {
  padding: 13px 32px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .2s;
}
.restart-btn:hover { opacity: .9; transform: translateY(-1px); }

@media(max-width:520px) {
  .qcard { padding: 20px 16px; }
  .q-text { font-size: 15px; }
  .ox-btn { padding: 12px; font-size: 26px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-label">확률 기초 퀴즈</div>
    <h1>직관과 수학,<br>어느 쪽이 맞을까?</h1>
    <p>우리의 직관은 종종 틀립니다.<br>10개 문제로 확률의 반직관적인 세계를 체험해 보세요.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progText">0 / 10</span>
      <span id="scoreText">점수: 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <div id="quizArea"></div>

  <div class="result-screen" id="resultScreen">
    <div class="score-ring">
      <svg viewBox="0 0 152 152">
        <circle cx="76" cy="76" r="70" stroke="#1e1e35"/>
        <circle cx="76" cy="76" r="70" id="scoreArc"
          stroke="url(#grad)" stroke-dasharray="439.82" stroke-dashoffset="439.82"/>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#ec4899"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-num" id="finalNum">0</div>
      <div class="score-denom">/ 10</div>
    </div>
    <div class="score-grade" id="scoreGrade"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <div class="review-list" id="reviewList"></div>
    <button class="restart-btn" onclick="restart()">↺ 다시 풀기</button>
  </div>
</div>

<script>
var QUIZZES = [{"id": 1, "type": "ox", "q": "동전을 10번 던져 앞면이 10번 연속으로 나왔다면, 11번째에는 뒷면이 나올 확률이 더 높다.", "answer": "X", "explain": "독립 시행에서 이전 결과는 다음에 영향을 주지 않습니다. 11번째 앞면/뒷면 확률은 여전히 각각 50%입니다. 이를 도박사의 오류(Gambler's Fallacy)라고 합니다.", "tag": "도박사의 오류"}, {"id": 2, "type": "mc", "q": "23명이 모인 반에서 생일이 같은 사람이 2명 이상 있을 확률은?", "choices": ["약 10%", "약 30%", "약 50%", "약 70%"], "answer": 2, "explain": "놀랍게도 약 50.7%입니다. 365일이나 되는데 고작 23명으로? 직관에 반하지만 수학적으로 정확합니다. 이를 생일 역설(Birthday Paradox)이라 합니다. 57명이면 99%를 넘습니다.", "tag": "생일 역설"}, {"id": 3, "type": "ox", "q": "희귀병(유병률 0.1%) 검사에서 정확도가 99%인 키트로 양성 판정을 받으면, 실제로 병에 걸렸을 확률은 99%에 가깝다.", "answer": "X", "explain": "실제 확률은 약 9%에 불과합니다. 유병률이 매우 낮으면 '거짓 양성'이 '진짜 양성'보다 훨씬 많아집니다. 이것이 베이즈 정리의 핵심입니다. 1만 명 중 실제 환자 10명(99%로 9.9명 적중)보다, 건강한 9990명 중 99명이 거짓 양성으로 나옵니다.", "tag": "베이즈 정리"}, {"id": 4, "type": "short", "q": "주사위를 한 번 굴려 3이 나왔습니다. 다음에 굴렸을 때 3이 나올 확률은 얼마인가요? (분수로 답하세요)", "answer": "1/6", "accept": ["1/6", "6분의1", "6분의 1", "0.167", "약 0.17"], "explain": "이전에 무엇이 나왔든 주사위의 각 면이 나올 확률은 항상 1/6입니다. 주사위는 이전 결과를 '기억'하지 않습니다.", "tag": "독립 시행"}, {"id": 5, "type": "mc", "q": "3개의 문 중 1개 뒤에 자동차가 있습니다. 당신이 1번 문을 선택하자, 진행자가 3번 문을 열어 꽝을 보여줬습니다. 이제 2번 문으로 바꾸면?", "choices": ["바꿔도 확률이 같다 (1/2)", "바꾸면 확률이 낮아진다 (1/3)", "바꾸면 확률이 높아진다 (2/3)", "진행자가 뭘 보여줬는지는 확률에 영향 없다"], "answer": 2, "explain": "바꾸면 당첨 확률이 2/3로 높아집니다! 처음 선택이 꽝일 확률이 2/3이고, 진행자는 항상 꽝을 열기 때문에 그 2/3의 확률이 나머지 문으로 이동합니다. 이를 몬티홀 문제(Monty Hall Problem)라 합니다.", "tag": "몬티홀 문제"}, {"id": 6, "type": "ox", "q": "공정한 동전을 1,000번 던지면 앞면이 정확히 500번 나온다.", "answer": "X", "explain": "큰 수의 법칙은 '비율'이 0.5에 가까워진다는 것이지, 횟수가 정확히 500이 된다는 뜻이 아닙니다. 실제로는 예를 들어 487번이나 513번처럼 차이가 날 수 있습니다. 시행 횟수가 늘수록 '비율'은 수렴하지만 '절대적 차이'는 오히려 커질 수 있습니다.", "tag": "큰 수의 법칙"}, {"id": 7, "type": "mc", "q": "두 자녀를 둔 가정에서 첫째가 딸인 것을 알고 있습니다. 둘째도 딸일 확률은?", "choices": ["1/4", "1/3", "1/2", "2/3"], "answer": 2, "explain": "첫째가 딸임을 알고 있으므로, 가능한 경우는 (딸,딸), (딸,아들) 두 가지입니다. 둘째도 딸인 경우는 (딸,딸) 하나이므로 확률은 1/2입니다. 단, '적어도 한 명이 딸'이라는 조건이라면 1/3이 됩니다 — 조건의 표현 방식이 확률을 바꿉니다!", "tag": "조건부 확률"}, {"id": 8, "type": "short", "q": "스팸 이메일 100개 중 '무료'라는 단어가 60개에, '클릭'이라는 단어가 50개에 등장합니다. 두 단어 중 적어도 하나가 등장하는 이메일이 80개라면, 두 단어가 동시에 등장하는 이메일은 몇 개인가요?", "answer": "30", "accept": ["30", "30개"], "explain": "포함-배제 원리: P(A∪B) = P(A) + P(B) - P(A∩B) → 80 = 60 + 50 - P(A∩B) → P(A∩B) = 30개입니다.", "tag": "덧셈 법칙"}, {"id": 9, "type": "mc", "q": "나이브 베이즈가 '나이브(naive, 순진한)'라고 불리는 이유는?", "choices": ["계산이 너무 단순해서", "학습 데이터가 적어도 된다고 가정해서", "모든 특징이 서로 독립이라고 가정해서", "사전 확률을 항상 0.5로 가정해서"], "answer": 2, "explain": "'무료'와 '클릭'이 함께 등장하는 경향이 있어도, 나이브 베이즈는 두 단어를 완전히 독립으로 봅니다. 이 가정이 현실과 맞지 않아도 실용적으로 잘 작동한다는 것이 이 알고리즘의 역설적 매력입니다.", "tag": "나이브 가정"}, {"id": 10, "type": "ox", "q": "학습 데이터에 한 번도 등장하지 않은 단어는 P(단어|스팸) = 0이므로, 그 단어가 포함된 이메일은 절대 스팸으로 분류되지 않는다.", "answer": "X", "explain": "이것이 '제로 확률 문제'입니다. 확률이 0인 항이 곱셈에 포함되면 전체 값이 0이 되어버립니다. 라플라스 스무딩(분자+1, 분모+V)으로 이를 해결합니다. 한 번도 관찰되지 않았어도 확률이 0이 되지 않습니다.", "tag": "라플라스 스무딩"}];

var cur    = 0;
var score  = 0;
var answered = [];  // {idx, correct}
var done   = false;

function init() {
  cur = 0; score = 0; answered = []; done = false;
  document.getElementById('resultScreen').className = 'result-screen';
  document.getElementById('quizArea').innerHTML = '';
  QUIZZES.forEach(function(q, i) {
    document.getElementById('quizArea').appendChild(makeCard(q, i));
  });
  showCard(0);
  updateProgress();
}

function makeCard(q, i) {
  var div = document.createElement('div');
  div.className = 'qcard';
  div.id = 'qcard_' + i;

  var typeLabel = q.type === 'ox' ? 'O / X' : q.type === 'mc' ? '4지선다' : '단답형';
  var typeCls   = q.type === 'ox' ? 'type-ox' : q.type === 'mc' ? 'type-mc' : 'type-short';

  var h = '<div class="qcard-header">';
  h += '<div class="q-num">Q' + (i+1) + '</div>';
  h += '<span class="q-tag">' + q.tag + '</span>';
  h += '<span class="q-type ' + typeCls + '">' + typeLabel + '</span>';
  h += '</div>';
  h += '<div class="q-text">' + q.q + '</div>';

  if (q.type === 'ox') {
    h += '<div class="ox-btns">';
    h += '<button class="ox-btn" id="ox_O_' + i + '" data-qi="' + i + '" data-val="O" onclick="answerOXBtn(this)">';
    h += '<span>⭕</span><span class="ox-label">O (맞다)</span></button>';
    h += '<button class="ox-btn" id="ox_X_' + i + '" data-qi="' + i + '" data-val="X" onclick="answerOXBtn(this)">';
    h += '<span>❌</span><span class="ox-label">X (틀리다)</span></button>';
    h += '</div>';
  } else if (q.type === 'mc') {
    h += '<div class="mc-list">';
    var letters = ['A','B','C','D'];
    q.choices.forEach(function(ch, ci) {
      h += '<button class="mc-btn" id="mc_' + i + '_' + ci + '" onclick="answerMC(' + i + ',' + ci + ')">';
      h += '<span class="mc-idx">' + letters[ci] + '</span>';
      h += '<span>' + ch + '</span></button>';
    });
    h += '</div>';
  } else {
    h += '<div class="short-area">';
    h += '<input type="text" class="short-inp" id="short_' + i + '"'
       + ' placeholder="답을 입력하세요...">';
    h += '<button class="submit-btn" id="shortbtn_' + i + '">확인</button>';
    h += '</div>';
  }

  h += '<div class="explain" id="explain_' + i + '"></div>';
  h += '<button class="next-btn" id="next_' + i + '" onclick="nextQ(' + i + ')">';
  h += i < QUIZZES.length-1 ? '다음 문제 →' : '결과 보기 →';
  h += '</button>';

  div.innerHTML = h;
  // Wire short answer interactions safely
  if (q.type === 'short') {
    var inp = div.querySelector('.short-inp');
    var sbtn = div.querySelector('.submit-btn');
    if (inp && sbtn) {
      inp.addEventListener('keydown', function(evt) {
        if (evt.key === 'Enter') answerShort(i);
      });
      sbtn.addEventListener('click', function() { answerShort(i); });
    }
  }
  return div;
}

function showCard(i) {
  document.querySelectorAll('.qcard').forEach(function(c) { c.classList.remove('active'); });
  var el = document.getElementById('qcard_' + i);
  if (el) {
    el.classList.add('active');
    if (QUIZZES[i].type === 'short') {
      setTimeout(function() {
        var inp = document.getElementById('short_' + i);
        if (inp) inp.focus();
      }, 100);
    }
  }
}

function showExplain(i, correct) {
  var q = QUIZZES[i];
  var el = document.getElementById('explain_' + i);
  var icon = correct ? '✅' : '❌';
  var label = correct ? '<strong>정답입니다!</strong>' : '<strong>오답입니다.</strong>';
  el.innerHTML = '<span class="result-icon">' + icon + '</span>' + label + '<br>' + q.explain;
  el.classList.add('show');
  var nb = document.getElementById('next_' + i);
  if (nb) nb.classList.add('show');
}

function answerOXBtn(btn) {
  var i   = parseInt(btn.getAttribute('data-qi'));
  var val = btn.getAttribute('data-val');
  answerOX(i, val);
}

function answerOX(i, val) {
  var q = QUIZZES[i];
  var correct = (val === q.answer);
  if (correct) score++;
  answered.push({idx:i, correct:correct});

  var other = val === 'O' ? 'X' : 'O';
  var selBtn = document.getElementById('ox_' + val + '_' + i);
  var othBtn = document.getElementById('ox_' + other + '_' + i);
  if (correct) {
    if (selBtn) selBtn.classList.add('correct');
  } else {
    if (selBtn) selBtn.classList.add('wrong');
    var corrBtn = document.getElementById('ox_' + q.answer + '_' + i);
    if (corrBtn) corrBtn.classList.add('correct');
  }
  if (othBtn && !othBtn.classList.contains('correct')) othBtn.classList.add('dimmed');
  // disable
  ['O','X'].forEach(function(k) {
    var b = document.getElementById('ox_' + k + '_' + i);
    if (b) b.onclick = null;
  });
  showExplain(i, correct);
  updateProgress();
}

function answerMC(i, ci) {
  var q = QUIZZES[i];
  var correct = (ci === q.answer);
  if (correct) score++;
  answered.push({idx:i, correct:correct});

  q.choices.forEach(function(_, ki) {
    var btn = document.getElementById('mc_' + i + '_' + ki);
    if (!btn) return;
    btn.onclick = null;
    if (ki === ci) {
      btn.classList.add(correct ? 'correct' : 'wrong');
    } else if (ki === q.answer && !correct) {
      btn.classList.add('show-correct');
    } else {
      btn.classList.add('dimmed');
    }
  });
  showExplain(i, correct);
  updateProgress();
}

function answerShort(i) {
  var q = QUIZZES[i];
  var inp = document.getElementById('short_' + i);
  var btn = document.getElementById('shortbtn_' + i);
  if (!inp || !btn) return;
  var val = inp.value.trim();
  if (!val) return;

  var correct = false;
  var accepts = q.accept || [q.answer];
  accepts.forEach(function(a) {
    if (val === a || val.replace(/\s/g,'') === a.replace(/\s/g,'')) correct = true;
  });
  if (correct) score++;
  answered.push({idx:i, correct:correct});

  inp.classList.add(correct ? 'correct' : 'wrong');
  inp.disabled = true;
  btn.disabled = true;
  if (!correct) {
    inp.placeholder = '정답: ' + q.answer;
  }
  showExplain(i, correct);
  updateProgress();
}

function nextQ(i) {
  if (i >= QUIZZES.length-1) {
    showResult();
  } else {
    cur = i+1;
    showCard(cur);
    updateProgress();
  }
}

function updateProgress() {
  var done = answered.length;
  document.getElementById('progText').innerText = done + ' / ' + QUIZZES.length;
  document.getElementById('scoreText').innerText = '점수: ' + score;
  document.getElementById('progFill').style.width = (done / QUIZZES.length * 100) + '%';
}

function showResult() {
  document.querySelectorAll('.qcard').forEach(function(c) { c.classList.remove('active'); });
  var rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  var pct = score / QUIZZES.length;
  var arc = document.getElementById('scoreArc');
  var circumference = 439.82;
  setTimeout(function() {
    arc.style.strokeDashoffset = circumference * (1 - pct);
    arc.style.transition = 'stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';
  }, 100);

  document.getElementById('finalNum').innerText = score;

  var grades = [
    {min:10, g:'🏆 완벽!',   m:'확률 마스터! 직관의 함정을 모두 피해갔습니다.'},
    {min:8,  g:'🎯 우수!',   m:'확률 감각이 뛰어납니다. 조금만 더 연습하면 완벽!'},
    {min:6,  g:'👍 양호',    m:'기본기는 갖췄습니다. 틀린 문제를 다시 확인해보세요.'},
    {min:4,  g:'📚 분발',    m:'우리의 직관은 자주 틀립니다. 다시 도전해보세요!'},
    {min:0,  g:'💪 재도전!', m:'확률은 배울수록 재밌어집니다. 해설을 꼼꼼히 읽어보세요.'},
  ];
  var gd = grades.find(function(g) { return score >= g.min; });
  document.getElementById('scoreGrade').innerText = gd.g;
  document.getElementById('scoreMsg').innerText = gd.m;

  var rl = document.getElementById('reviewList');
  var rh = '<div style="font-size:12px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">문제별 결과</div>';
  answered.forEach(function(a) {
    var q = QUIZZES[a.idx];
    rh += '<div class="review-item">';
    rh += '<span class="review-icon">' + (a.correct ? '✅' : '❌') + '</span>';
    rh += '<div><strong style="color:#fff">Q' + (a.idx+1) + '. </strong>';
    rh += '<span style="color:#94a3b8;font-size:12px">' + q.tag + '</span><br>';
    rh += '<span style="font-size:13px">' + q.q.slice(0, 60) + (q.q.length > 60 ? '…' : '') + '</span>';
    rh += '</div></div>';
  });
  rl.innerHTML = rh;
}

function restart() {
  init();
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
